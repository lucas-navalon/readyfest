services:
  db:
    image: postgres:16-alpine
    container_name: readyfest-db
    environment:
      POSTGRES_DB: readyfest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d readyfest"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build:
      context: ./backend
    container_name: readyfest-backend
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/readyfest
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
    container_name: readyfest-frontend
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "5173:80"

volumes:
  postgres_data:
